name: Actualización diaria del portafolio

on:
  schedule:
    # GitHub Actions usa horario UTC.
    # Ciudad de México normalmente es UTC-6.
    # 07:17 UTC = 01:17 CDMX.
    - cron: "17 07 * * *"

  workflow_dispatch:   # Permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write       # Necesario para que el bot pueda hacer commit de los JSON

concurrency:
  group: portfolio-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ver hora de ejecución
        run: |
          echo "Hora UTC:"
          date -u
          echo ""
          echo "Hora Ciudad de México:"
          TZ='America/Mexico_City' date

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Calcular indicadores
        run: |
          python3 portfolio_engine.py

      - name: Ver archivos generados
        run: |
          echo "Archivos en el repositorio después de ejecutar portfolio_engine.py:"
          ls -la
          echo ""
          echo "Validando archivos esperados:"
          test -f portfolio_data.json && echo "portfolio_data.json generado correctamente" || echo "portfolio_data.json NO existe"
          test -f daily_report.json && echo "daily_report.json generado correctamente" || echo "daily_report.json NO existe"

      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add portfolio_data.json daily_report.json

          if git diff --staged --quiet; then
            echo "No hay cambios para guardar."
          else
            git commit -m "Datos $(TZ='America/Mexico_City' date +%Y-%m-%d)"
            git push
          fi
