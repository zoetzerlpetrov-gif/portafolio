<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portafolio · Panel diario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF7; --surface:#FFFFFF; --border:#E8E4DA; --border-strong:#D8D3C6;
    --ink:#1C1B19; --muted:#6E6B63; --faint:#9A968C;
    --up:#157A4E; --up-bg:#E7F2EB; --down:#BF362D; --down-bg:#FBEAE7;
    --wait:#9A6B12; --wait-bg:#F7EFDD; --accent:#0E5560;
    --mono:'IBM Plex Mono',ui-monospace,monospace; --sans:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 22px 60px}

  header.top{display:flex;justify-content:space-between;align-items:flex-end;
             gap:16px;flex-wrap:wrap;border-bottom:1.5px solid var(--ink);padding-bottom:14px}
  .brand h1{font-size:25px;font-weight:700;letter-spacing:-.02em;margin:0}
  .brand p{margin:3px 0 0;color:var(--muted);font-size:13px}
  .stamp{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right}
  .stamp b{color:var(--ink);font-weight:600}

  .board{margin:26px 0 34px}
  .board h2{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
            color:var(--faint);margin:0 0 12px}
  .lanes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .lane{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
  .lane h3{margin:0 0 10px;font-size:13px;font-weight:600;display:flex;
           align-items:center;gap:8px;letter-spacing:.01em}
  .lane h3 .dot{width:9px;height:9px;border-radius:50%}
  .lane.buy h3 .dot{background:var(--up)} .lane.sell h3 .dot{background:var(--down)}
  .lane.wait h3 .dot{background:var(--wait)}
  .lane .count{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
  .chip{display:flex;justify-content:space-between;align-items:center;gap:8px;
        padding:7px 10px;border-radius:8px;background:var(--bg);margin-bottom:6px}
  .chip:last-child{margin-bottom:0}
  .chip .tk{font-family:var(--mono);font-weight:600;font-size:13px}
  .chip .sc{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .lane .empty{color:var(--faint);font-size:13px;padding:4px 2px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
        padding:16px 16px 14px;display:flex;flex-direction:column;gap:12px}
  .card .head{display:flex;justify-content:space-between;align-items:flex-start}
  .card .tk{font-family:var(--mono);font-weight:600;font-size:16px;letter-spacing:-.01em}
  .card .px{font-family:var(--mono);font-size:21px;font-weight:600;text-align:right;line-height:1.1}
  .card .px small{display:block;font-size:11px;color:var(--faint);font-weight:400;margin-top:2px}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
        padding:3px 9px;border-radius:999px;font-family:var(--mono)}
  .pill.up{background:var(--up-bg);color:var(--up)}
  .pill.down{background:var(--down-bg);color:var(--down)}
  .pill.flat{background:var(--wait-bg);color:var(--wait)}

  .spark{width:100%;height:46px;display:block}

  .range{margin-top:2px}
  .range .track{position:relative;height:7px;border-radius:4px;background:var(--border);margin:9px 0 6px}
  .range .fill{position:absolute;top:0;bottom:0;left:0;border-radius:4px;background:var(--border-strong)}
  .range .mark{position:absolute;top:-3px;width:3px;height:13px;border-radius:2px;background:var(--accent)}
  .range .ends{display:flex;justify-content:space-between;font-family:var(--mono);
               font-size:11px;color:var(--faint)}

  .rows{display:flex;flex-direction:column;gap:5px;font-size:13px}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .row .k{color:var(--muted)} .row .v{font-family:var(--mono);text-align:right}
  .row .v.sup{color:var(--up)} .row .v.res{color:var(--down)}

  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;font-family:var(--mono);padding:2px 7px;border-radius:6px;
       border:1px solid var(--border-strong);color:var(--muted)}
  .tag.dn{border-color:#E3CBA0;color:var(--wait);background:var(--wait-bg)}
  .tag.div{border-color:#BBD9C6;color:var(--up);background:var(--up-bg)}

  .note{margin-top:34px;font-size:12px;color:var(--faint);text-align:center;line-height:1.6}

  .state{max-width:560px;margin:80px auto;text-align:center}
  .state h2{font-size:20px;margin:0 0 10px}
  .state p{color:var(--muted);margin:0 0 16px}
  .state pre{text-align:left;background:#1C1B19;color:#EDEAE2;font-family:var(--mono);
             font-size:12.5px;padding:14px 16px;border-radius:10px;overflow:auto}

  @media (max-width:680px){ .lanes{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Panel del portafolio</h1>
      <p>Señales de apoyo a la decisión · no es asesoría financiera</p>
    </div>
    <div class="stamp" id="stamp">Cargando…</div>
  </header>
  <main id="app"></main>
</div>

<script>
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};

const fmtPrice = (v, cur) => {
  if(v==null) return '—';
  try{ return new Intl.NumberFormat('es-MX',{style:'currency',currency:cur||'MXN',
       maximumFractionDigits:2}).format(v); }
  catch{ return v.toFixed(2); }
};
const fmtDate = (iso) => {
  if(!iso) return null;
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
};

function sparkline(values){
  if(!values || values.length<2) return '<svg class="spark"></svg>';
  const w=300,h=46,p=3, min=Math.min(...values), max=Math.max(...values),
        span=(max-min)||1, n=values.length;
  const pts = values.map((v,i)=>{
    const x = p + i*(w-2*p)/(n-1);
    const y = h-p - (v-min)/span*(h-2*p);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const up = values[n-1] >= values[0];
  const col = up ? 'var(--up)' : 'var(--down)';
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6"
      stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function trendPill(trend, pct){
  const map = {alcista:['up','↑'], bajista:['down','↓'], lateral:['flat','→']};
  const [cls,arrow] = map[trend] || ['flat','·'];
  const p = (pct!=null) ? `${pct>=0?'+':''}${pct.toFixed(2)}%/sem` : '';
  return `<span class="pill ${cls}">${arrow} ${trend||'—'} ${p}</span>`;
}

function rangeBar(low, high, cur){
  if(low==null||high==null||cur==null||high<=low) return '';
  const pct = Math.max(0,Math.min(100,(cur-low)/(high-low)*100));
  return `<div class="range">
    <div class="track"><div class="fill" style="width:${pct.toFixed(1)}%"></div>
      <div class="mark" style="left:calc(${pct.toFixed(1)}% - 1.5px)"></div></div>
    <div class="ends"><span>mín 1a ${low.toFixed(2)}</span><span>máx 1a ${high.toFixed(2)}</span></div>
  </div>`;
}

function dividendTag(a){
  if(!a.pays_dividend) return '';
  let t = 'Reparte';
  if(a.dividend_yield_pct!=null) t += ` · ${a.dividend_yield_pct}%`;
  const nd = fmtDate(a.next_ex_dividend_date);
  if(nd) t += ` · prox. ${nd}`;
  return `<span class="tag div">${t}</span>`;
}

function card(a, category){
  const tags = [];
  if(a.double_bottom) tags.push('<span class="tag dn">doble piso</span>');
  if(a.double_top)    tags.push('<span class="tag dn">doble techo</span>');
  const dt = dividendTag(a);
  if(dt) tags.push(dt);

  return $(`<div class="card">
    <div class="head">
      <div><div class="tk">${a.ticker}</div>${trendPill(a.trend, a.trend_pct_per_week)}</div>
      <div class="px">${fmtPrice(a.current_price, a.currency)}<small>precio actual</small></div>
    </div>
    ${sparkline(a.sparkline_12m)}
    ${rangeBar(a.low_1y, a.high_1y, a.current_price)}
    <div class="rows">
      <div class="row"><span class="k">Soporte</span>
        <span class="v sup">${a.support!=null?a.support.toFixed(2):'—'}${a.dist_to_support_pct!=null?` · ${a.dist_to_support_pct}%`:''}</span></div>
      <div class="row"><span class="k">Resistencia</span>
        <span class="v res">${a.resistance!=null?a.resistance.toFixed(2):'—'}${a.dist_to_resistance_pct!=null?` · ${a.dist_to_resistance_pct}%`:''}</span></div>
      <div class="row"><span class="k">Rango 5a</span>
        <span class="v">${a.low_5y!=null?a.low_5y.toFixed(2):'—'} – ${a.high_5y!=null?a.high_5y.toFixed(2):'—'}</span></div>
      <div class="row"><span class="k">Rango 10a</span>
        <span class="v">${a.low_10y!=null?a.low_10y.toFixed(2):'—'} – ${a.high_10y!=null?a.high_10y.toFixed(2):'—'}</span></div>
    </div>
    ${tags.length?`<div class="tags">${tags.join('')}</div>`:''}
  </div>`);
}

function lane(cls, title, items){
  const chips = items.length
    ? items.map(i=>`<div class="chip"><span class="tk">${i.ticker}</span>
        <span class="sc">score ${i.score>=0?'+':''}${i.score}</span></div>`).join('')
    : '<div class="empty">Nada por ahora</div>';
  return `<div class="lane ${cls}"><h3><span class="dot"></span>${title}
    <span class="count">${items.length}</span></h3>${chips}</div>`;
}

function emptyState(){
  document.getElementById('app').innerHTML = `<div class="state">
    <h2>Aún no hay datos</h2>
    <p>El panel lee <code>portfolio_data.json</code> y <code>daily_report.json</code>.
       Genera esos archivos con el motor y sírvelos por HTTP (abrir el archivo directo
       no funciona por seguridad del navegador):</p>
    <pre>python3 portfolio_engine.py
python3 -m http.server 8000
# abre http://localhost:8000</pre>
    <p>O publícalo en GitHub Pages para tener un enlace permanente.</p></div>`;
  document.getElementById('stamp').textContent = 'Sin datos';
}

async function load(){
  try{
    const [pd, rp] = await Promise.all([
      fetch('./portfolio_data.json').then(r=>{if(!r.ok)throw 0;return r.json();}),
      fetch('./daily_report.json').then(r=>{if(!r.ok)throw 0;return r.json();}),
    ]);

    document.getElementById('stamp').innerHTML =
      `Actualizado<br><b>${fmtDate(rp.generated_at)||'—'}</b> · actualiza diario 7:00`;

    const r = rp.report || {};
    const catOf = {};
    ['comprar','vender','esperar'].forEach(c=>(r[c]||[]).forEach(i=>catOf[i.ticker]=c));

    const board = `<section class="board"><h2>Veredicto de hoy</h2>
      <div class="lanes">
        ${lane('buy','Comprar', r.comprar||[])}
        ${lane('wait','Esperar', r.esperar||[])}
        ${lane('sell','Vender', r.vender||[])}
      </div></section>`;

    const app = document.getElementById('app');
    app.innerHTML = board + '<div class="grid" id="grid"></div>' +
      '<p class="note">Soporte/resistencia: pivotes de 60 días · Tendencia: regresión de 9 velas semanales · ' +
      'Rangos: máximos y mínimos por ventana · Las señales son orientativas y pueden dar falsos positivos.</p>';

    const grid = document.getElementById('grid');
    const ok = pd.filter(a=>a.ok!==false);
    ok.sort((a,b)=>{const o={comprar:0,esperar:1,vender:2};
      return (o[catOf[a.ticker]]??1)-(o[catOf[b.ticker]]??1);});
    ok.forEach(a=>grid.appendChild(card(a, catOf[a.ticker])));
  }catch(e){ emptyState(); }
}
load();
</script>
</body>
</html>
